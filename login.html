<!DOCTYPE html>
<html lang="fr-FR">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braake. - Connexion</title>
  <link rel="stylesheet" type="text/css" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/imgs/logo.png">
</head>
<body>
  <header>
    <nav class="navbar">
        <div class="bandeaug">
            <a href="index.html" class="logo">Braake.</a>
            <ul class="nav-links">
              <li><a href="index.html">Accueil</a></li>
                <li><a href="#">Chaussures</a></li>
                <li><a href="#">Hommes</a></li>
                <li><a href="#">Femmes</a></li>
                <li><a href="#">Nouveautés</a></li>
            </ul>
        </div>
        <div class="bandeaud">
            <button class="panier-btn" onclick="window.location.href='panier.html'" aria-label="Panier">
                <img src="assets/imgs/panier.png" alt="Icône du panier">
            </button>

            <button class="account-btn" onclick="window.location.href='login.html#Container'" aria-label="Mon compte">
                <img src="assets/imgs/account.png" alt="Icône du compte">
            </button>

            <form class="search-form" action="recherche.html" method="get" role="search">
                <input 
                    type="text" 
                    name="q" 
                    placeholder="Rechercher..." 
                    aria-label="Rechercher sur le site" 
                    required
                >
                <button type="submit" class="search-btn" aria-label="Rechercher">
                    <img src="assets/imgs/search.png" alt="Icône de recherche">
                </button>
            </form>
        </div>
    </nav>
</header>
  <div class="container-login" id="Container">
    <div class="pgauche">
      <div class="bienvenue">
        <h4>Bienvenue sur</h4>
        <h1>Braake.</h1>
      </div>
      <form method="post">
        <input type="email" name="email" placeholder="Adresse email" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <div class="remember">
          <input type="checkbox" name="remember">
          <p>Se souvenir de moi</p>
          <a href="#">Mot de passe oublié ?</a>
        </div>
        <button type="submit">Se Connecter</button>
        <div class="separator" role="separator" aria-orientation="horizontal" aria-hidden="false">
          <span>ou</span>
        </div>
        <button type="button">Créer un compte</button>
      </form>
    </div>
    <div class="pdroite">
      <img src="assets/imgs/vitrine.png" alt="Illustration">
    </div>
  </div>
</body>
</html>
